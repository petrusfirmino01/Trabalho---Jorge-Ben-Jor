<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <header>
        <div class="bloco-header">
            <h1>Cadastro de usuário</h1>
        </div>
    </header>

    <div class="form-cadastro">
        <h1>Faça seu cadastro para se tornar um Fã de carteirinha.</h1>
        <form>
            <div class="form-group">
                <label for="nome">Digite seu nome:</label>
                <input type="text" id="nome" name="nome" placeholder="AQUI OH!" required>
            </div>

            <div class="form-group">
                <label for="email">Digite seu email:</label>
                <input type="email" id="email" name="email" placeholder="AQUI OH!" required>
            </div>

            <div class="form-group">
                <label for="senha">Crie sua senha:</label>
                <input type="password" id="senha" name="senha" placeholder="AQUI OH!" required minlength="6">
            </div>

            <div class="form-actions">
                <button type="submit" class="form-submit">Cadastrar</button>
                <a class="btn-ir" href="trabai.html">Ir para a página de Fã</a>
            </div>
        </form>
    </div>
</body>
</html>
